<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Utilisateur</title>
    <link rel="stylesheet" href="projet.css">
</head>
<body>
    <form>
        <h1>Modifier l'utilisateur</h1>

        <label for="name">Nom d'utilisateur:</label>
        <input type="text" id="name" name="name" required>

        <label for="surname">Prénom:</label>
        <input type="text" id="surname" name="surname" required>

        <label for="genre">Genre:</label>
        <select id="genre" name="genre" required>
            <option value="male">Homme</option>
            <option value="female">Femme</option>
        </select>

        <label for="numPhone">Numéro de téléphone:</label>
        <input type="tel" id="numPhone" name="numPhone" required>

        <label for="dateNaissance">Date de naissance:</label>
        <input type="date" id="dateNaissance" name="dateNaissance" required>

        <label for="adresse">Adresse:</label>
        <input type="text" id="adresse" name="adresse" required>

        <label for="role">Role:</label>
        <input type="text" id="role" name="role" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <button type="submit" id="updateUser">Enregistrer les modifications</button>
    </form>
    <a class="back-link" href="listUser.html">Retour à la liste</a>
</body>
<script src="update.js"></script>
</html>
